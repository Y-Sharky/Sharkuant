name: Update Stock Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run stock_suggestion.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python stock_suggestion.py --auto

      - name: Commit and push updated cache files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 只添加存在的文件
          files_to_add="news_data.csv 推荐股票.csv industry_heat.csv concept_heat.csv"
          if [ -f concept_map_cache.json ]; then
            files_to_add="$files_to_add concept_map_cache.json"
          fi
          git add $files_to_add
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update data"
          git push