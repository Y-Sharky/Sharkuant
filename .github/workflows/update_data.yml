name: Update Stock Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 升级到 v4

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Set up Python
        uses: actions/setup-python@v5   # 升级到 v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run stock_suggestion.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python stock_suggestion.py --auto

      - name: Commit and push updated cache files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          files_to_add=""
          for f in news_data.csv 推荐股票.csv industry_heat.csv concept_heat.csv concept_map_cache.json; do
            if [ -f "$f" ]; then
              files_to_add="$files_to_add $f"
            fi
          done
          if [ -n "$files_to_add" ]; then
            git add $files_to_add
            git diff --quiet && git diff --staged --quiet || git commit -m "Auto update data"
            git push
          else
            echo "No files to add."
          fi